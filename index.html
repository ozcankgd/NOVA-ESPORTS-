<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Esports</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    color: white;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px;
    z-index: 100;
}

nav a {
    color: white;
    text-decoration: none;
}

nav a:hover {
    color: #00ffcc;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #000, #001f3f);
    text-align: center;
}

.hero h1 {
    font-size: 60px;
    color: #00ffcc;
}

/* SECTION */
section {
    padding: 80px 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    border: 1px solid rgba(0,255,204,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00ffcc;
}

/* PLAYER IMAGE */
.card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid #00ffcc;
}

/* RESULT IMAGE */
.card img.result {
    width: 100%;
    border-radius: 10px;
}

/* CONTACT */
.contact {
    text-align: center;
}

/* ADMIN PANEL */
#admin {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    padding: 20px;
    overflow-y: auto;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

button {
    background: #00ffcc;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="#home">Home</a>
    <a href="#players">Players</a>
    <a href="#results">Results</a>
    <a href="#contact">Contact</a>
    <a href="#" onclick="openAdmin()">Admin</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
    <div>
        <h1 id="teamName">TEAM</h1>
        <p id="teamDesc"></p>
    </div>
</section>

<!-- PLAYERS -->
<section id="players">
    <h2>Players</h2>

    <div class="grid">

        <div class="card">
            <img id="img1">
            <p id="p1"></p>
        </div>

        <div class="card">
            <img id="img2">
            <p id="p2"></p>
        </div>

        <div class="card">
            <img id="img3">
            <p id="p3"></p>
        </div>

        <div class="card">
            <img id="img4">
            <p id="p4"></p>
        </div>

    </div>
</section>

<!-- RESULTS -->
<section id="results">
    <h2>Results</h2>
    <div id="resultList" class="grid"></div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
    <h2>Contact</h2>
    <p>📸 Instagram: @team</p>
    <p>💬 Discord: discord.gg/team</p>
</section>

<!-- ADMIN -->
<div id="admin">
    <h2>ADMIN</h2>

    <input id="tname" placeholder="Team Name">
    <textarea id="tdesc" placeholder="Description"></textarea>

    <input id="p1n" placeholder="Player 1">
    <input id="p1i" placeholder="Image URL">

    <input id="p2n" placeholder="Player 2">
    <input id="p2i" placeholder="Image URL">

    <input id="p3n" placeholder="Player 3">
    <input id="p3i" placeholder="Image URL">

    <input id="p4n" placeholder="Player 4">
    <input id="p4i" placeholder="Image URL">

    <textarea id="rtext" placeholder="Result text"></textarea>
    <input id="rimg" placeholder="Result image">

    <button onclick="addResult()">Add Result</button>
    <button onclick="save()">Save</button>
    <button onclick="closeAdmin()">Close</button>
</div>

<script>

/* ADMIN */
let pass = localStorage.getItem("pass");

if (!pass) {
    localStorage.setItem("pass", prompt("Admin şifre oluştur:"));
}

function openAdmin() {
    let p = prompt("Şifre:");
    if (p === localStorage.getItem("pass")) {
        admin.style.display = "block";
    }
}

function closeAdmin() {
    admin.style.display = "none";
}

/* SAVE */
function save() {
    localStorage.setItem("team", tname.value);
    localStorage.setItem("desc", tdesc.value);

    localStorage.setItem("p1", p1n.value);
    localStorage.setItem("p1i", p1i.value);

    localStorage.setItem("p2", p2n.value);
    localStorage.setItem("p2i", p2i.value);

    localStorage.setItem("p3", p3n.value);
    localStorage.setItem("p3i", p3i.value);

    localStorage.setItem("p4", p4n.value);
    localStorage.setItem("p4i", p4i.value);

    load();
}

/* RESULTS */
function addResult() {
    let data = JSON.parse(localStorage.getItem("res") || "[]");

    data.push({
        text: rtext.value,
        img: rimg.value
    });

    localStorage.setItem("res", JSON.stringify(data));
    loadResults();
}

/* LOAD */
function load() {

    teamName.innerText = localStorage.getItem("team") || "TEAM";
    teamDesc.innerText = localStorage.getItem("desc") || "";

    p1.innerText = localStorage.getItem("p1") || "";
    img1.src = localStorage.getItem("p1i") || "";

    p2.innerText = localStorage.getItem("p2") || "";
    img2.src = localStorage.getItem("p2i") || "";

    p3.innerText = localStorage.getItem("p3") || "";
    img3.src = localStorage.getItem("p3i") || "";

    p4.innerText = localStorage.getItem("p4") || "";
    img4.src = localStorage.getItem("p4i") || "";
}

function loadResults() {
    let data = JSON.parse(localStorage.getItem("res") || "[]");

    resultList.innerHTML = "";

    data.forEach(r => {
        resultList.innerHTML += `
        <div class="card">
            <p>${r.text}</p>
            <img class="result" src="${r.img}">
        </div>`;
    });
}

load();
loadResults();

</script>

</body>
</html>
