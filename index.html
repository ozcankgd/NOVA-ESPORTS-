<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA ESPORTS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: #00ff88;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  border-bottom: 1px solid #00ff88;
}

header h1 {
  text-shadow: 0 0 10px #00ff88;
}

.menu {
  cursor: pointer;
  font-size: 24px;
}

/* NAV */
nav {
  display: none;
  flex-direction: column;
  background: rgba(0,0,0,0.9);
}

nav a {
  padding: 15px;
  border-bottom: 1px solid #00ff88;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h2 {
  font-size: 32px;
  text-shadow: 0 0 20px #00ff88;
}

.hero p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(0,255,136,0.05);
  border: 1px solid rgba(0,255,136,0.2);
  border-radius: 15px;
  backdrop-filter: blur(10px);
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px #00ff88;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

/* BUTTON */
button {
  background: #00ff88;
  border: none;
  padding: 10px;
  width: 100%;
  margin-top: 10px;
  cursor: pointer;
}

/* ADMIN */
.hidden {
  display: none;
}

/* SPONSOR */
.sponsor {
  text-align: center;
  padding: 30px;
  font-size: 18px;
  border-top: 1px solid #00ff88;
}
</style>
</head>

<body>

<header>
  <h1>NOVA ESPORTS</h1>
  <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<nav id="nav">
  <a href="#">Ana Sayfa</a>
  <a href="#players">Oyuncular</a>
  <a href="#tournaments">Turnuvalar</a>
  <a onclick="adminLogin()">Yetkili</a>
</nav>

<section class="hero">
  <h2>PUBG MOBILE TEAM</h2>
  <p>Elite Competitive Squad</p>
</section>

<section id="players">
  <h2 style="padding:20px;">Oyuncular</h2>
  <div class="grid" id="playerList"></div>
</section>

<section id="tournaments">
  <h2 style="padding:20px;">Turnuvalar</h2>
  <div class="grid" id="tournamentList"></div>
</section>

<section class="sponsor">
  💚 SPONSOR: EPINFY 💚
</section>

<div id="adminPanel" class="hidden" style="padding:20px;">
  <h2>Admin Panel</h2>

  <input id="name" placeholder="İsim"><br>
  <input id="age" placeholder="Yaş"><br>
  <input id="fps" placeholder="FPS"><br>
  <input id="photo" placeholder="Foto link"><br>
  <button onclick="addPlayer()">Oyuncu Ekle</button>

  <br><br>

  <input id="tName" placeholder="Turnuva"><br>
  <input id="tPhoto" placeholder="Foto"><br>
  <input id="tDesc" placeholder="Açıklama"><br>
  <button onclick="addTournament()">Turnuva Ekle</button>
</div>

<script>
let password = "1234";

function toggleMenu() {
  let nav = document.getElementById("nav");
  nav.style.display = nav.style.display === "flex" ? "none" : "flex";
}

function adminLogin() {
  let input = prompt("Şifre:");
  if(input === password){
    document.getElementById("adminPanel").classList.remove("hidden");
  }
}

function addPlayer(){
  let name = nameInput.value;
  let age = ageInput.value;
  let fps = fpsInput.value;
  let photo = photoInput.value;

  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${photo}">
    <div class="card-content">
      <h3>${name}</h3>
      <p>Yaş: ${age}</p>
      <p>FPS: ${fps}</p>
    </div>
  `;

  playerList.appendChild(div);
}

function addTournament(){
  let name = tName.value;
  let photo = tPhoto.value;
  let desc = tDesc.value;

  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${photo}">
    <div class="card-content">
      <h3>${name}</h3>
      <p>${desc}</p>
    </div>
  `;

  tournamentList.appendChild(div);
}
</script>

</body>
</html>
