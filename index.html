<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA ESPORTS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: #00ff88;
}

header {
  background: #000;
  padding: 15px;
  text-align: center;
  border-bottom: 2px solid #00ff88;
}

nav {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

nav a {
  color: #00ff88;
  text-decoration: none;
}

section {
  padding: 20px;
}

.player-card {
  background: #111;
  margin: 10px;
  padding: 10px;
  border: 1px solid #00ff88;
  border-radius: 10px;
}

button {
  background: #00ff88;
  border: none;
  padding: 10px;
  cursor: pointer;
}

/* Animasyon */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(#00ff88 1px, transparent 1px);
  animation: move 10s linear infinite;
}

@keyframes move {
  from { transform: translate(0,0); }
  to { transform: translate(-100px,-100px); }
}
</style>
</head>

<body>

<header>
  <h1>NOVA ESPORTS</h1>
</header>

<nav>
  <a href="#">Ana Sayfa</a>
  <a href="#">Oyuncular</a>
  <a href="#">Turnuvalar</a>
  <a href="#">Haberler</a>
  <a href="#">İletişim</a>
</nav>

<section>
  <h2>Oyuncular</h2>

  <div class="player-card">
    <h3>Oyuncu 1</h3>
    <p>Yaş: 18</p>
    <p>FPS: 90</p>
  </div>

  <div class="player-card">
    <h3>Oyuncu 2</h3>
    <p>Yaş: 19</p>
    <p>FPS: 60</p>
  </div>

</section>

<script>
let password = "1234";

function adminPanel() {
  let input = prompt("Şifre gir:");
  if(input === password) {
    alert("Giriş başarılı! (Admin panel yapılacak)");
  } else {
    alert("Yanlış şifre!");
  }
}
</script>

</body>
</html>
