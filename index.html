<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA E-SPORTS</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #020202, #0b1f3a);
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

nav a {
    color: white;
    margin: 0 10px;
    cursor: pointer;
}

nav a:hover {
    color: #00ffcc;
}

/* SAYFA */
.page {
    display: none;
    padding: 40px;
}

.active {
    display: block;
}

/* PLAYER */
.player {
    display: flex;
    gap: 20px;
    align-items: center;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin: 15px 0;
    border-radius: 15px;
}

.player img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
}

.info {
    display: flex;
    flex-direction: column;
}

/* RESULT */
.result img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    background: #00ffcc;
    border: none;
    padding: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<nav>
    <b>NOVA</b>
    <div>
        <a onclick="show('home')">Ana</a>
        <a onclick="show('players')">Oyuncular</a>
        <a onclick="show('results')">Sonuçlar</a>
        <a onclick="show('contact')">İletişim</a>
    </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
    <h1>NOVA E-SPORTS</h1>
    <p>Profesyonel PUBG Takımı</p>
</div>

<!-- PLAYERS -->
<div id="players" class="page">

    <h2>Oyuncular</h2>

    <div class="player">
        <img src="https://via.placeholder.com/90">
        <div class="info">
            <b>Player 1</b>
            <span>Yaş: 18</span>
            <span>FPS: 120</span>
        </div>
    </div>

    <div class="player">
        <img src="https://via.placeholder.com/90">
        <div class="info">
            <b>Player 2</b>
            <span>Yaş: 19</span>
            <span>FPS: 130</span>
        </div>
    </div>

</div>

<!-- RESULTS -->
<div id="results" class="page">
    <h2>Sonuçlar</h2>

    <div class="player">
        <img src="https://via.placeholder.com/300x150">
        <div class="info">
            <b>Scrim Win 🏆</b>
            <span>Takım harika oynadı</span>
        </div>
    </div>

</div>

<!-- CONTACT -->
<div id="contact" class="page">
    <h2>İletişim</h2>
    <p>Instagram: @nova</p>
    <p>Discord: discord.gg/nova</p>
</div>

<script>
function show(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
